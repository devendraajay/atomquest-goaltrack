services:
  - type: web
    name: atomquest-goaltrack-api
    env: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: CORS_ORIGINS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: atomquest-goaltrack-db
          property: connectionString

  - type: static
    name: atomquest-goaltrack-portal
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: atomquest-goaltrack-api
          property: host

databases:
  - name: atomquest-goaltrack-db
    plan: free
