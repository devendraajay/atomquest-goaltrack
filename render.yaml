services:
  - type: web
    name: atomquest-goaltrack-api
    runtime: docker
    plan: free
    rootDir: backend
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: CORS_ORIGINS
        value: https://atomquest-goaltrack-portal.onrender.com
      - key: DATABASE_URL
        fromDatabase:
          name: atomquest-goaltrack-db
          property: connectionString

  - type: web
    name: atomquest-goaltrack-portal
    runtime: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://atomquest-goaltrack-api.onrender.com
      - key: NODE_VERSION
        value: "22"
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: atomquest-goaltrack-db
    plan: free
