services:
  - type: web
    name: atomquest-goaltrack-api
    env: docker
    plan: free
    dockerfilePath: ./Dockerfile
    healthCheckPath: /health
    envVars:
      - key: CORS_ORIGINS
        value: "*"
      - key: DATABASE_URL
        fromDatabase:
          name: atomquest-goaltrack-db
          property: connectionString

databases:
  - name: atomquest-goaltrack-db
    plan: free
